<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Producten | BioBudget.nl</title>
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://biobudget.nl/">
  <script>
    const params = new URLSearchParams(location.search);
    const category = params.get("categorie");
    const brandByCategory = {
      Houtvezelisolatie: "GUTEX",
      Schapenwolisolatie: "ISOLENA",
      Luchtdichting: "pro clima",
      Constructieplaten: "ELKA",
      Kalkhennepisolatie: "EXIE"
    };
    const brand = brandByCategory[category];
    location.replace(`index.html${brand ? `?merk=${encodeURIComponent(brand)}` : ""}#producten`);
  </script>
</head>
<body>
  <p>De producten staan nu op de <a href="index.html#producten">homepage van BioBudget.nl</a>.</p>
</body>
</html>
